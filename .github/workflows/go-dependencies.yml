name: Update Dependencies

on:
  schedule:
    - cron: '0 0 * * 0'  # Run every Sunday at midnight
  workflow_dispatch:     # Allow manual triggers

jobs:
  update-deps:
    name: Update Go Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Update dependencies
        run: |
          go get -u ./...
          go mod tidy

      - name: Check if there are changes
        id: changes
        run: |
          git diff --exit-code go.mod go.sum || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update Go dependencies"
          title: "chore: update Go dependencies"
          body: |
            This PR updates Go dependencies to their latest versions.
            
            This is an automated PR created by the `Update Dependencies` workflow.
          branch: update-dependencies
          branch-suffix: timestamp
          labels: dependencies